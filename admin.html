<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理登录 - 我的数字花园</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-md);
    }
    
    .login-box {
      width: 100%;
      max-width: 400px;
      background: var(--color-card);
      padding: var(--spacing-lg);
      border-radius: var(--radius-md);
    }
    
    .login-box h1 {
      text-align: center;
      margin-bottom: var(--spacing-lg);
      font-size: 1.5rem;
    }
    
    .form-group {
      margin-bottom: var(--spacing-md);
    }
    
    .form-group label {
      display: block;
      margin-bottom: var(--spacing-xs);
      color: var(--color-text-muted);
    }
    
    .form-group input {
      width: 100%;
      padding: 12px;
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      color: var(--color-text);
      font-size: 1rem;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--color-accent);
    }
    
    .btn-full {
      width: 100%;
      margin-top: var(--spacing-sm);
    }
    
    .error-msg {
      color: #e74c3c;
      font-size: 0.9rem;
      margin-bottom: var(--spacing-sm);
      display: none;
    }
    
    .hint {
      text-align: center;
      margin-top: var(--spacing-md);
      color: var(--color-text-muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <h1>管理后台</h1>
      <p class="error-msg" id="error">密码错误，请重试</p>
      <form id="loginForm">
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="password" placeholder="请输入管理密码" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">登录</button>
      </form>
      <p class="hint">输入密码登录</p>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/admin?id=eq.1`, {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        const data = await res.json();
        
        if (data && data.length > 0 && data[0].password === password) {
          sessionStorage.setItem('admin_logged', 'true');
          window.location.href = 'dashboard.html';
        } else {
          document.getElementById('error').style.display = 'block';
        }
      } catch (err) {
        document.getElementById('error').textContent = '登录失败，请重试';
        document.getElementById('error').style.display = 'block';
      }
    });
  </script>
</body>
</html>
