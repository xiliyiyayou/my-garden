<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笔记 - 我的数字花园</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .page-header {
      text-align: center;
      padding: var(--spacing-xl) 0 var(--spacing-lg);
    }
    
    .page-header h1 {
      margin-bottom: var(--spacing-xs);
    }
    
    .page-header p {
      color: var(--color-text-muted);
    }
    
    .filter-tags {
      display: flex;
      justify-content: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
      flex-wrap: wrap;
    }
    
    .filter-tag {
      padding: 8px 16px;
      background: var(--color-card);
      border-radius: 20px;
      cursor: pointer;
      transition: var(--transition);
      color: var(--color-text-muted);
    }
    
    .filter-tag:hover,
    .filter-tag.active {
      background: var(--color-accent);
      color: var(--color-bg);
    }
    
    .note-card {
      cursor: pointer;
    }
    
    .note-card h3 {
      transition: color 0.3s ease;
    }
    
    .note-card:hover h3 {
      color: var(--color-accent);
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">我的<span>空间</span></a>
      <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="timeline.html">时间线</a></li>
        <li><a href="gallery.html">相册</a></li>
        <li><a href="notes.html">笔记</a></li>
        <li><a href="about.html">关于</a></li>
      </ul>
      <div class="nav-toggle">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>

  <main class="page" id="main-content">
    <div class="container">
      <header class="page-header fade-in">
        <h1>学习笔记</h1>
        <p>记录学习心得与技术总结</p>
      </header>
      
      <div class="filter-tags fade-in">
        <span class="filter-tag active">全部</span>
        <span class="filter-tag">技术</span>
        <span class="filter-tag">学习</span>
        <span class="filter-tag">读书</span>
        <span class="filter-tag">其他</span>
      </div>
      
      <div class="notes-list fade-in" id="notes-list-content"></div>
        
        <article class="note-card card">
          <h3>时间管理的一些思考</h3>
          <div class="note-meta">
            <span>2026年2月1日</span> · <span>其他</span>
          </div>
          <p class="note-excerpt">如何更好地管理时间，让生活更有序...</p>
          <div class="tags" style="margin-top: 12px;">
            <span class="tag">思考</span>
          </div>
        </article>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 我的数字花园 · 用心记录每一天</p>
    </div>
  </footer>

  <script src="js/supabase.js"></script>
  <script src="js/main.js"></script>
  <script src="js/frontend.js"></script>
  <script src="js/dev-entry.js"></script>
  <script>
    document.querySelectorAll('.filter-tag').forEach(tag => {
      tag.addEventListener('click', function() {
        document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>
</body>
</html>
